# =============================================
# Career Recommendation System - Configuration
# =============================================

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:careerdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — create tables fresh on every startup
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CRITICAL: must be true so Hibernate creates tables BEFORE data.sql runs
spring.jpa.defer-datasource-initialization=true

# CRITICAL: must be 'always' so data.sql is actually executed
spring.sql.init.mode=always

# Server
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false

# Session
server.servlet.session.timeout=30m

# Logging
logging.level.com.example=INFO
logging.level.org.springframework.security=WARN
