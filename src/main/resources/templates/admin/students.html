<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Manage Students — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body{background:#f1f5f9;}
        .sidebar{background:linear-gradient(180deg,#1e293b,#0f172a);min-height:100vh;width:240px;position:fixed;top:0;left:0;padding-top:20px;z-index:100;}
        .sidebar .brand{color:#fff;font-weight:700;font-size:1.1rem;padding:16px 20px 24px;border-bottom:1px solid #334155;}
        .sidebar a{display:block;color:#94a3b8;padding:10px 20px;text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:.2s;}
        .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:#3b82f6;}
        .sidebar a i{margin-right:8px;}
        .main{margin-left:240px;padding:30px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-mortarboard-fill me-2"></i>Career Admin</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="/admin/students" class="active"><i class="bi bi-people"></i>Students</a>
    <a href="/admin/careers"><i class="bi bi-briefcase"></i>Careers</a>
    <a href="/admin/skills"><i class="bi bi-tools"></i>Skills</a>
        <a href="/admin/aptitude"><i class="bi bi-clipboard2-check"></i>Aptitude Tests</a>
    <a href="/admin/users"><i class="bi bi-person-badge"></i>Users</a>
    <a href="/admin/recommend"><i class="bi bi-stars"></i>Recommendations</a>
    <a href="/portal/logout" style="color:#f87171;"><i class="bi bi-box-arrow-right"></i>Logout</a>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Students</h4>
            <small class="text-muted">All registered student profiles</small>
        </div>
        <a href="/admin/dashboard" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th><th>Name</th><th>Department</th><th>CGPA</th>
                        <th>Year</th><th>College</th><th>Enrollment</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s,i : ${students}">
                        <td th:text="${i.count}"></td>
                        <td class="fw-semibold" th:text="${s.fullName}"></td>
                        <td th:text="${s.department}"></td>
                        <td><span class="badge bg-primary" th:text="${s.cgpa}"></span></td>
                        <td th:text="${s.yearOfStudy}"></td>
                        <td th:text="${s.collegeName ?: '-'}"></td>
                        <td th:text="${s.enrollmentNumber ?: '-'}"></td>
                        <td>
                            <form th:action="@{/admin/recommend}" method="post" class="d-inline">
                                <input type="hidden" name="studentId" th:value="${s.studentId}"/>
                                <button class="btn btn-sm btn-outline-warning"><i class="bi bi-stars"></i></button>
                            </form>
                            <a th:href="@{/admin/students/delete/{id}(id=${s.studentId})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this student?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="8" class="text-center text-muted py-4">No students registered yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
