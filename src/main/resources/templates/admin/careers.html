<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Manage Careers — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body{background:#f1f5f9;}
        .sidebar{background:linear-gradient(180deg,#1e293b,#0f172a);min-height:100vh;width:240px;position:fixed;top:0;left:0;padding-top:20px;z-index:100;}
        .sidebar .brand{color:#fff;font-weight:700;font-size:1.1rem;padding:16px 20px 24px;border-bottom:1px solid #334155;}
        .sidebar a{display:block;color:#94a3b8;padding:10px 20px;text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:.2s;}
        .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:#3b82f6;}
        .sidebar a i{margin-right:8px;}
        .main{margin-left:240px;padding:30px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-mortarboard-fill me-2"></i>Career Admin</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="/admin/students"><i class="bi bi-people"></i>Students</a>
    <a href="/admin/careers" class="active"><i class="bi bi-briefcase"></i>Careers</a>
    <a href="/admin/skills"><i class="bi bi-tools"></i>Skills</a>
    <a href="/admin/aptitude"><i class="bi bi-clipboard2-check"></i>Aptitude Tests</a>
    <a href="/admin/users"><i class="bi bi-person-badge"></i>Users</a>
    <a href="/admin/recommend"><i class="bi bi-stars"></i>Recommendations</a>
    <a href="/portal/logout" style="color:#f87171;"><i class="bi bi-box-arrow-right"></i>Logout</a>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h4 class="fw-bold mb-0">Careers</h4><small class="text-muted">Manage career master data</small></div>
        <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addCareerModal">
            <i class="bi bi-plus-circle me-1"></i>Add Career
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
        <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th>#</th><th>Career</th><th>Domain</th><th>Required Skills</th><th>Min CGPA</th><th>Avg Salary</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="c,i : ${careers}">
                        <td th:text="${i.count}"></td>
                        <td class="fw-semibold" th:text="${c.careerName}"></td>
                        <td><span class="badge bg-info text-dark" th:text="${c.domain}"></span></td>
                        <td class="small text-muted" th:text="${c.requiredSkills}"></td>
                        <td th:text="${c.minimumCGPA}"></td>
                        <td th:text="${'₹' + #numbers.formatInteger(c.averageSalary,1,'COMMA')}"></td>
                        <td>
                            <a th:href="@{/admin/careers/delete/{id}(id=${c.careerId})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Delete this career?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(careers)}">
                        <td colspan="7" class="text-center text-muted py-4">No careers yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Career Modal -->
<div class="modal fade" id="addCareerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 rounded-3">
            <div class="modal-header bg-success text-white rounded-top-3">
                <h5 class="modal-title"><i class="bi bi-briefcase-fill me-2"></i>Add New Career</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/careers/save}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Career Name *</label>
                        <input type="text" name="careerName" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Domain *</label>
                        <select name="domain" class="form-select" required>
                            <option value="">Select domain</option>
                            <option>IT</option><option>Data Science</option><option>AI/ML</option>
                            <option>Finance</option><option>Management</option><option>Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Required Skills</label>
                        <input type="text" name="requiredSkills" class="form-control" placeholder="Java, Python, SQL"/>
                    </div>
                    <div class="row g-2">
                        <div class="col">
                            <label class="form-label fw-semibold">Min CGPA *</label>
                            <input type="number" name="minimumCGPA" class="form-control" step="0.1" min="0" max="10" required/>
                        </div>
                        <div class="col">
                            <label class="form-label fw-semibold">Avg Salary (₹)</label>
                            <input type="number" name="averageSalary" class="form-control" min="0"/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-circle me-1"></i>Save Career</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
