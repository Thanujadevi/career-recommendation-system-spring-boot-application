<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Manage Questions — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body{background:#f1f5f9;}
        .sidebar{background:linear-gradient(180deg,#1e293b,#0f172a);min-height:100vh;width:240px;position:fixed;top:0;left:0;padding-top:20px;z-index:100;}
        .sidebar .brand{color:#fff;font-weight:700;font-size:1.1rem;padding:16px 20px 24px;border-bottom:1px solid #334155;}
        .sidebar a{display:block;color:#94a3b8;padding:10px 20px;text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:.2s;}
        .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:#3b82f6;}
        .sidebar a i{margin-right:8px;}
        .main{margin-left:240px;padding:30px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
        .correct-badge{background:#dcfce7;color:#166534;font-weight:700;padding:2px 8px;border-radius:6px;font-size:.8rem;}
        .option-row{padding:4px 8px;border-radius:6px;margin:2px 0;}
        .option-correct{background:#dcfce7;}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-mortarboard-fill me-2"></i>Career Admin</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="/admin/students"><i class="bi bi-people"></i>Students</a>
    <a href="/admin/careers"><i class="bi bi-briefcase"></i>Careers</a>
    <a href="/admin/skills"><i class="bi bi-tools"></i>Skills</a>
    <a href="/admin/aptitude" class="active"><i class="bi bi-clipboard2-check"></i>Aptitude Tests</a>
    <a href="/admin/users"><i class="bi bi-person-badge"></i>Users</a>
    <a href="/admin/recommend"><i class="bi bi-stars"></i>Recommendations</a>
    <a href="/portal/logout" style="color:#f87171;"><i class="bi bi-box-arrow-right"></i>Logout</a>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Questions: <span class="text-warning" th:text="${test.testName}"></span></h4>
            <small class="text-muted">
                <span class="badge bg-secondary me-1" th:text="${test.testType}"></span>
                <span class="badge bg-light text-dark me-1" th:text="${test.difficultyLevel}"></span>
                <span th:text="${test.totalQuestions + ' questions · ' + test.totalMarks + ' marks · ' + test.duration + ' min'}"></span>
            </small>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-warning fw-bold btn-sm" data-bs-toggle="modal" data-bs-target="#addQModal">
                <i class="bi bi-plus-circle me-1"></i>Add Question
            </button>
            <a href="/admin/aptitude" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back to Tests
            </a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
        <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(questions)}" class="card p-5 text-center text-muted">
        <i class="bi bi-question-circle fs-1 d-block mb-2 opacity-50"></i>
        <h5>No questions yet</h5>
        <p class="small">Click "Add Question" to add your first MCQ question to this test.</p>
    </div>

    <div th:each="q,i : ${questions}" class="card p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1">
                <div class="d-flex align-items-start gap-2 mb-2">
                    <span class="badge bg-primary rounded-circle" th:text="${i.count}"></span>
                    <div>
                        <div class="fw-semibold" th:text="${q.questionText}"></div>
                        <div class="small mt-1">
                            <span class="badge bg-light text-dark me-1" th:text="${q.section}"></span>
                            <span class="badge bg-info text-dark" th:text="${q.marks + ' mark(s)'}"></span>
                        </div>
                    </div>
                </div>
                <div class="row g-1 mt-2 ms-4">
                    <div class="col-md-6">
                        <div class="option-row" th:classappend="${q.correctAnswer == 'A' ? 'option-correct' : ''}">
                            <span class="fw-bold me-1">A.</span><span th:text="${q.optionA}"></span>
                            <span th:if="${q.correctAnswer == 'A'}" class="correct-badge ms-1">✓ Correct</span>
                        </div>
                        <div class="option-row" th:classappend="${q.correctAnswer == 'B' ? 'option-correct' : ''}">
                            <span class="fw-bold me-1">B.</span><span th:text="${q.optionB}"></span>
                            <span th:if="${q.correctAnswer == 'B'}" class="correct-badge ms-1">✓ Correct</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="option-row" th:classappend="${q.correctAnswer == 'C' ? 'option-correct' : ''}">
                            <span class="fw-bold me-1">C.</span><span th:text="${q.optionC}"></span>
                            <span th:if="${q.correctAnswer == 'C'}" class="correct-badge ms-1">✓ Correct</span>
                        </div>
                        <div class="option-row" th:classappend="${q.correctAnswer == 'D' ? 'option-correct' : ''}">
                            <span class="fw-bold me-1">D.</span><span th:text="${q.optionD}"></span>
                            <span th:if="${q.correctAnswer == 'D'}" class="correct-badge ms-1">✓ Correct</span>
                        </div>
                    </div>
                </div>
            </div>
            <a th:href="@{/admin/aptitude/{tid}/questions/delete/{qid}(tid=${test.testId},qid=${q.questionId})}"
               class="btn btn-sm btn-outline-danger ms-3"
               onclick="return confirm('Delete this question?')">
                <i class="bi bi-trash"></i>
            </a>
        </div>
    </div>
</div>

<!-- Add Question Modal -->
<div class="modal fade" id="addQModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-3">
            <div class="modal-header bg-warning rounded-top-3">
                <h5 class="modal-title fw-bold"><i class="bi bi-question-circle me-2"></i>Add Question</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/aptitude/{id}/questions/save(id=${test.testId})}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Question *</label>
                        <textarea name="questionText" class="form-control" rows="2" required
                                  placeholder="Enter the question text here..."></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Option A *</label>
                            <input type="text" name="optionA" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Option B *</label>
                            <input type="text" name="optionB" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Option C *</label>
                            <input type="text" name="optionC" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Option D *</label>
                            <input type="text" name="optionD" class="form-control" required/>
                        </div>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Correct Answer *</label>
                            <select name="correctAnswer" class="form-select" required>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Section *</label>
                            <select name="section" class="form-select" required>
                                <option value="LOGICAL">Logical</option>
                                <option value="VERBAL">Verbal</option>
                                <option value="QUANTITATIVE">Quantitative</option>
                                <option value="MIXED">Mixed</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Marks</label>
                            <input type="number" name="marks" class="form-control" value="1" min="1" max="10"/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-warning fw-bold">
                        <i class="bi bi-plus-circle me-1"></i>Add Question
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
