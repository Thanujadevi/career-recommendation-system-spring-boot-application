<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Manage Skills — Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body{background:#f1f5f9;}
        .sidebar{background:linear-gradient(180deg,#1e293b,#0f172a);min-height:100vh;width:240px;position:fixed;top:0;left:0;padding-top:20px;z-index:100;}
        .sidebar .brand{color:#fff;font-weight:700;font-size:1.1rem;padding:16px 20px 24px;border-bottom:1px solid #334155;}
        .sidebar a{display:block;color:#94a3b8;padding:10px 20px;text-decoration:none;font-size:.9rem;border-left:3px solid transparent;transition:.2s;}
        .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,255,255,.07);border-left-color:#3b82f6;}
        .sidebar a i{margin-right:8px;}
        .main{margin-left:240px;padding:30px;}
        .card{border:none;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="bi bi-mortarboard-fill me-2"></i>Career Admin</div>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="/admin/students"><i class="bi bi-people"></i>Students</a>
    <a href="/admin/careers"><i class="bi bi-briefcase"></i>Careers</a>
    <a href="/admin/skills" class="active"><i class="bi bi-tools"></i>Skills</a>
    <a href="/admin/aptitude"><i class="bi bi-clipboard2-check"></i>Aptitude Tests</a>
    <a href="/admin/users"><i class="bi bi-person-badge"></i>Users</a>
    <a href="/admin/recommend"><i class="bi bi-stars"></i>Recommendations</a>
    <a href="/portal/logout" style="color:#f87171;"><i class="bi bi-box-arrow-right"></i>Logout</a>
</div>
<div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div><h4 class="fw-bold mb-0">Skills</h4><small class="text-muted">Manage skill master data</small></div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addSkillModal">
            <i class="bi bi-plus-circle me-1"></i>Add Skill
        </button>
    </div>
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
        <span th:text="${success}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr><th>#</th><th>Skill</th><th>Category</th><th>Difficulty</th><th>Industry</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    <tr th:each="sk,i : ${skills}">
                        <td th:text="${i.count}"></td>
                        <td class="fw-semibold" th:text="${sk.skillName}"></td>
                        <td><span class="badge bg-secondary" th:text="${sk.skillCategory}"></span></td>
                        <td th:text="${sk.difficultyLevel}"></td>
                        <td th:text="${sk.industryRelevance}"></td>
                        <td>
                            <span th:if="${sk.active}" class="badge bg-success">Active</span>
                            <span th:unless="${sk.active}" class="badge bg-secondary">Inactive</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/skills/toggle/{id}(id=${sk.skillId})}"
                               class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-toggle-on"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(skills)}">
                        <td colspan="7" class="text-center text-muted py-4">No skills yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Skill Modal -->
<div class="modal fade" id="addSkillModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 rounded-3">
            <div class="modal-header bg-primary text-white rounded-top-3">
                <h5 class="modal-title"><i class="bi bi-tools me-2"></i>Add New Skill</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/skills/save}" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Skill Name *</label>
                        <input type="text" name="skillName" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category *</label>
                        <select name="skillCategory" class="form-select" required>
                            <option value="">Select category</option>
                            <option>Programming</option><option>Framework</option>
                            <option>Database</option><option>AI/ML</option>
                            <option>Design</option><option>Management</option><option>Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row g-2">
                        <div class="col">
                            <label class="form-label fw-semibold">Difficulty</label>
                            <select name="difficultyLevel" class="form-select">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label fw-semibold">Industry Relevance</label>
                            <input type="text" name="industryRelevance" class="form-control" placeholder="IT, Finance..."/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i>Save Skill</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
