<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Error — Career Recommendation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <style>
        body{background:#f0f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .error-card{border:none;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,.15);max-width:500px;width:100%;}
    </style>
</head>
<body>
<div class="card error-card text-center p-5">
    <div class="text-danger mb-3" style="font-size:4rem;">&#9888;</div>
    <h4 class="fw-bold" th:text="${'Error ' + status}">Error</h4>
    <p class="text-muted" th:text="${error}">Something went wrong.</p>
    <p class="small text-muted" th:if="${message}" th:text="${message}"></p>
    <a href="/portal/login" class="btn btn-primary mt-3">Go to Login</a>
</div>
</body>
</html>
