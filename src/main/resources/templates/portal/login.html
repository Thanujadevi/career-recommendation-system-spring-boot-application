<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login — Career Recommendation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 40%, #0288d1 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card { border: none; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,.3); max-width: 440px; width: 100%; }
        .brand-header { background: linear-gradient(135deg, #1a237e, #283593); color: white; border-radius: 20px 20px 0 0; padding: 30px; }
        .btn-login { background: linear-gradient(135deg, #1565c0, #0288d1); border: none; color: white; font-weight: 600; }
        .btn-login:hover { opacity: .9; color: white; }
        .form-control:focus { border-color: #0288d1; box-shadow: 0 0 0 .2rem rgba(2,136,209,.25); }
    </style>
</head>
<body>
<div class="login-card card">
    <div class="brand-header text-center">
        <i class="bi bi-mortarboard-fill fs-1 mb-2 d-block"></i>
        <h4 class="fw-bold mb-0">Career Recommendation</h4>
        <small class="opacity-75">Sign in to your account</small>
    </div>
    <div class="card-body p-4">

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        </div>

        <!-- IMPORTANT: action="/login" is the Spring Security login processing URL -->
        <form th:action="@{/login}" method="post">
            <!-- Thymeleaf auto-injects CSRF token -->
            <div class="mb-3">
                <label class="form-label fw-semibold"><i class="bi bi-person me-1"></i>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus/>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold"><i class="bi bi-lock me-1"></i>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required/>
            </div>
            <button type="submit" class="btn btn-login w-100 py-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>

        <hr class="my-4"/>
        <div class="text-center">
            <p class="text-muted small mb-2">Don't have an account?</p>
            <a href="/portal/register" class="btn btn-outline-success btn-sm px-4">
                <i class="bi bi-person-plus me-1"></i>Register as Student
            </a>
        </div>
    </div>
</div>
</body>
</html>
