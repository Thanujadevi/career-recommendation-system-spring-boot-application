<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${test.testName} + ' — Career Recommendation'">Take Test</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body{background:#f0f4f8;}
        .navbar{background:linear-gradient(135deg,#0d47a1,#1565c0);}
        .test-header{background:linear-gradient(135deg,#e65100,#ff6d00);color:white;padding:25px 30px;border-radius:0 0 20px 20px;margin-bottom:30px;}
        .card{border:none;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
        .question-card{border-left:4px solid #ff6d00;}
        .option-label{display:block;padding:10px 15px;border:2px solid #e5e7eb;border-radius:10px;cursor:pointer;margin-bottom:8px;transition:.2s;}
        .option-label:hover{border-color:#ff6d00;background:#fff7ed;}
        input[type=radio]:checked + .option-label{border-color:#ff6d00;background:#fff7ed;font-weight:600;}
        input[type=radio]{display:none;}
        .timer-box{background:rgba(255,255,255,.2);border-radius:10px;padding:8px 16px;font-size:1.1rem;font-weight:700;}
        #timer.danger{color:#fca5a5;}
        .sticky-submit{position:sticky;bottom:20px;z-index:10;}
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold" href="/portal/dashboard"><i class="bi bi-mortarboard-fill me-2"></i>Career Recommendation</a>
</nav>

<div class="test-header px-4">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h3 class="fw-bold mb-1" th:text="${test.testName}"></h3>
            <small class="opacity-75">
                <span th:text="${test.testType}"></span> ·
                <span th:text="${#lists.size(questions)} + ' Questions'"></span> ·
                <span th:text="${test.totalMarks} + ' Marks'"></span>
            </small>
        </div>
        <div class="timer-box">
            <i class="bi bi-clock me-1"></i><span id="timer" th:attr="data-seconds=${test.duration * 60}">--:--</span>
        </div>
    </div>
</div>

<div class="container-fluid px-4">
    <form th:action="@{/portal/aptitude/submit/{id}(id=${test.testId})}" method="post" id="testForm">

        <div th:each="q,i : ${questions}" class="card question-card p-4 mb-4">
            <div class="d-flex gap-3">
                <span class="badge bg-warning text-dark rounded-circle d-flex align-items-center justify-content-center fw-bold"
                      style="min-width:32px;height:32px;" th:text="${i.count}"></span>
                <div class="flex-grow-1">
                    <p class="fw-semibold mb-3" th:text="${q.questionText}"></p>
                    <div class="small text-muted mb-2">
                        <span class="badge bg-light text-dark me-1" th:text="${q.section}"></span>
                        <span class="badge bg-info text-dark" th:text="${q.marks + ' mark(s)'}"></span>
                    </div>
                    <!-- Hidden radio + styled label trick -->
                    <div th:with="qName=${'answer_' + q.questionId}">
                        <div>
                            <input type="radio" th:id="${qName+'_A'}" th:name="${qName}" value="A"/>
                            <label th:for="${qName+'_A'}" class="option-label">
                                <span class="fw-bold me-2">A.</span><span th:text="${q.optionA}"></span>
                            </label>
                        </div>
                        <div>
                            <input type="radio" th:id="${qName+'_B'}" th:name="${qName}" value="B"/>
                            <label th:for="${qName+'_B'}" class="option-label">
                                <span class="fw-bold me-2">B.</span><span th:text="${q.optionB}"></span>
                            </label>
                        </div>
                        <div>
                            <input type="radio" th:id="${qName+'_C'}" th:name="${qName}" value="C"/>
                            <label th:for="${qName+'_C'}" class="option-label">
                                <span class="fw-bold me-2">C.</span><span th:text="${q.optionC}"></span>
                            </label>
                        </div>
                        <div>
                            <input type="radio" th:id="${qName+'_D'}" th:name="${qName}" value="D"/>
                            <label th:for="${qName+'_D'}" class="option-label">
                                <span class="fw-bold me-2">D.</span><span th:text="${q.optionD}"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sticky-submit text-center pb-4">
            <button type="submit" class="btn btn-lg fw-bold px-5 text-white"
                    style="background:linear-gradient(135deg,#e65100,#ff6d00);"
                    onclick="return confirm('Submit test? You cannot change answers after submission.')">
                <i class="bi bi-check-circle-fill me-2"></i>Submit Test
            </button>
        </div>
    </form>
</div>

<script>
// Countdown timer
const timerEl = document.getElementById('timer');
let seconds = parseInt(timerEl.getAttribute('data-seconds'));
const interval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
        clearInterval(interval);
        document.getElementById('testForm').submit();
        return;
    }
    const m = Math.floor(seconds / 60).toString().padStart(2,'0');
    const s = (seconds % 60).toString().padStart(2,'0');
    timerEl.textContent = m + ':' + s;
    if (seconds <= 60) timerEl.classList.add('danger');
}, 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
