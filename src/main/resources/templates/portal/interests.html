<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Interests — Career Recommendation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body{background:#f0f4f8;}
        .navbar{background:linear-gradient(135deg,#0d47a1,#1565c0);}
        .page-header{background:linear-gradient(135deg,#880e4f,#c2185b);color:white;padding:30px;border-radius:0 0 20px 20px;margin-bottom:30px;}
        .card{border:none;border-radius:14px;}
        .interest-item{border-left:4px solid #c2185b;}
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold" href="/portal/dashboard"><i class="bi bi-mortarboard-fill me-2"></i>Career Recommendation</a>
    <div class="d-flex gap-2">
        <a href="/portal/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/portal/skills" class="btn btn-outline-light btn-sm">Skills</a>
        <a href="/portal/aptitude" class="btn btn-outline-light btn-sm">Aptitude</a>
        <a href="/portal/recommendation" class="btn btn-warning btn-sm fw-bold">Recommendations</a>
        <a href="/portal/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>
</nav>
<div class="page-header px-4">
    <h3 class="fw-bold mb-0"><i class="bi bi-heart-fill me-2"></i>My Interests</h3>
    <small class="opacity-75">Define your career interests and preferred domains</small>
</div>
<div class="container-fluid px-4">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show py-2">
        <i class="bi bi-check-circle me-1"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="row g-4">
        <!-- Add Interest Form -->
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-plus-circle me-2" style="color:#c2185b;"></i>Add New Interest</h6>
                <form th:action="@{/portal/interests/save}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Interest Area *</label>
                        <input type="text" name="interestArea" class="form-control" required placeholder="e.g. Software Development"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Interest Level *</label>
                        <select name="interestLevel" class="form-select" required>
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Preferred Domain</label>
                        <select name="preferredDomain" class="form-select">
                            <option value="">Not specified</option>
                            <option>IT</option><option>Data Science</option><option>AI/ML</option>
                            <option>Finance</option><option>Management</option><option>Healthcare</option>
                        </select>
                    </div>
                    <button type="submit" class="btn w-100 text-white fw-bold" style="background:linear-gradient(135deg,#880e4f,#c2185b);">
                        <i class="bi bi-plus-circle me-1"></i>Add Interest
                    </button>
                </form>
            </div>
        </div>

        <!-- Interest List -->
        <div class="col-md-8">
            <div class="card shadow-sm p-4">
                <h6 class="fw-bold mb-3"><i class="bi bi-heart me-2" style="color:#c2185b;"></i>My Interests (<span th:text="${#lists.size(interests)}"></span>)</h6>
                <div th:if="${#lists.isEmpty(interests)}" class="text-center text-muted py-5">
                    <i class="bi bi-heart fs-1 d-block mb-2 opacity-50"></i>No interests added yet. Tell us what excites you!
                </div>
                <div th:each="i : ${interests}" class="card interest-item shadow-sm p-3 mb-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold" th:text="${i.interestArea}"></div>
                            <div class="mt-1">
                                <span class="badge me-1"
                                      th:classappend="${i.interestLevel == 'HIGH' ? 'bg-success' : (i.interestLevel == 'MEDIUM' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                      th:text="${i.interestLevel}"></span>
                                <span th:if="${i.preferredDomain}" class="badge bg-light text-dark" th:text="${i.preferredDomain}"></span>
                            </div>
                        </div>
                        <a th:href="@{/portal/interests/delete/{id}(id=${i.interestId})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Remove this interest?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
