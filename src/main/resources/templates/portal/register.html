<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Register — Career Recommendation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <style>
        body { min-height:100vh; background:linear-gradient(135deg,#0d47a1 0%,#1565c0 40%,#0288d1 100%); display:flex; align-items:center; justify-content:center; padding:30px 0; }
        .reg-card { border:none; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.3); max-width:560px; width:100%; }
        .brand-header { background:linear-gradient(135deg,#1b5e20,#2e7d32); color:white; border-radius:20px 20px 0 0; padding:25px 30px; }
        .btn-register { background:linear-gradient(135deg,#2e7d32,#43a047); border:none; color:white; font-weight:600; }
        .btn-register:hover { opacity:.9; color:white; }
    </style>
</head>
<body>
<div class="reg-card card">
    <div class="brand-header text-center">
        <i class="bi bi-person-plus-fill fs-1 mb-1 d-block"></i>
        <h4 class="fw-bold mb-0">Create Student Account</h4>
        <small class="opacity-75">Career Recommendation System</small>
    </div>
    <div class="card-body p-4">

        <div th:if="${error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
        </div>

        <form th:action="@{/portal/register}" method="post">
            <div class="row g-3">
                <!-- Account Details -->
                <div class="col-12"><h6 class="fw-bold text-muted mb-0"><i class="bi bi-shield-lock me-1"></i>Account Details</h6><hr class="mt-1"/></div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Username *</label>
                    <input type="text" name="username" class="form-control" required minlength="3"/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Email *</label>
                    <input type="email" name="email" class="form-control" required/>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Password *</label>
                    <input type="password" name="password" class="form-control" required minlength="6" placeholder="At least 6 characters"/>
                </div>

                <!-- Student Profile -->
                <div class="col-12 mt-2"><h6 class="fw-bold text-muted mb-0"><i class="bi bi-person-badge me-1"></i>Student Profile</h6><hr class="mt-1"/></div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Full Name *</label>
                    <input type="text" name="fullName" class="form-control" required/>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Gender</label>
                    <select name="gender" class="form-select">
                        <option value="">Prefer not to say</option>
                        <option>Male</option><option>Female</option><option>Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Department *</label>
                    <input type="text" name="department" class="form-control" required placeholder="e.g. Computer Science"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">Year of Study</label>
                    <select name="yearOfStudy" class="form-select">
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3" selected>3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold">CGPA *</label>
                    <input type="number" name="cgpa" class="form-control" step="0.01" min="0" max="10" required/>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">College Name</label>
                    <input type="text" name="collegeName" class="form-control"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Enrollment No.</label>
                    <input type="text" name="enrollmentNumber" class="form-control"/>
                </div>
            </div>

            <button type="submit" class="btn btn-register w-100 py-2 mt-4">
                <i class="bi bi-person-check me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Already have an account? </small>
            <a href="/portal/login" class="text-decoration-none small fw-semibold">Sign in</a>
        </div>
    </div>
</div>
</body>
</html>
